            box-shadow: 0 4px 20px 0 rgba(0,0,0,0.07);

<body class="bg-background min-h-screen text-on-background antialiased flex justify-center">
<div class="w-full max-w-[480px] relative pb-32">

<h1 class="text-headline-display font-headline-display text-on-surface">Moje miasta</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>

<main class="pt-24 px-margin-page flex flex-col gap-stack-md">
<!-- GPS Location Card -->
<button class="glass-card rounded-xl p-6 w-full text-left flex items-center justify-between hover:opacity-90 transition-opacity">
<div class="flex items-center gap-4">
<div class="text-3xl">📍</div>
<div class="flex flex-col">

<span class="text-label-metadata font-label-metadata text-text-tertiary">Poznań</span>
</div>
</div>
<div class="flex items-center gap-4">
<span class="text-[40px] leading-none font-hero-temp-mobile font-light text-primary">21°</span>
<span class="text-4xl">☀️</span>
</div>
</button>
<!-- City Card 1 -->
<button class="glass-card rounded-xl p-6 w-full text-left flex items-center justify-between hover:opacity-90 transition-opacity">
<div class="flex flex-col">
<span class="text-body-large font-body-large text-on-surface">Kraków</span>
<span class="text-label-metadata font-label-metadata text-text-tertiary">10:45 AM</span>
</div>
<div class="flex items-center gap-4">
<span class="text-[40px] leading-none font-hero-temp-mobile font-light text-on-surface">26°</span>
<span class="text-4xl">☀️</span>
</div>
</button>
<!-- City Card 2 -->
<button class="glass-card rounded-xl p-6 w-full text-left flex items-center justify-between hover:opacity-90 transition-opacity">
<div class="flex flex-col">

<span class="text-label-metadata font-label-metadata text-text-tertiary">10:45 AM</span>
</div>

<span class="text-[40px] leading-none font-hero-temp-mobile font-light text-on-surface">18°</span>
<span class="text-4xl">☁️</span>
</div>
</button>
</main>
<!-- Floating Action Button -->
<div class="fixed bottom-safe-area-bottom left-0 w-full px-margin-page pb-8 z-40 md:max-w-[480px] md:left-1/2 md:-translate-x-1/2 flex justify-center">
